name: Package Tracker Sync

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 0  * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic

      - name: Fetch and parse emails
        run: python fetch_packages.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_USER:        ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_PROVIDER:    ${{ secrets.EMAIL_PROVIDER }}

      - name: Push updated packages.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add packages.json
          git diff --staged --quiet || git commit -m "chore: update packages.json [skip ci]"
          git push origin main
