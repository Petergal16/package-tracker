name: Package Tracker Sync

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 0  * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic

      - name: Restore seen-IDs cache
        uses: actions/cache@v4
        with:
          path: .seen_ids.json
          key: seen-ids-${{ runner.os }}
          restore-keys: seen-ids-

      - name: Fetch and parse emails
        run: python fetch_packages.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_USER:        ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_PROVIDER:    ${{ secrets.EMAIL_PROVIDER }}

      - name: Commit updated packages.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update packages.json [skip ci]"
          file_pattern: "packages.json"

      - name: Save seen-IDs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .seen_ids.json
          key: seen-ids-${{ runner.os }}-${{ github.run_id }}
